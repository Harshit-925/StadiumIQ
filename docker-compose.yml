version: "3.9"

# ── StadiumIQ local development stack ──────────────────────────────────────
# Runs only the FastAPI backend. The frontend is served separately via
# `npm run dev` (Vite dev server on port 5173).
#
# Database/Auth: Supabase (cloud) — configure via .env file.
# Production:    Backend → Render, Frontend → Vercel.
#
# Usage:
#   cp .env.example .env   # fill in Supabase credentials and Gemini API key
#   docker compose up --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stadiumiq-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
