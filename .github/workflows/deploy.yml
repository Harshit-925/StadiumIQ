name: Deploy

on:
  push:
    branches: [main]

# Only run one deployment at a time per branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # NOTE: PocketBase is hosted on PocketHost.io (free, no credit card).
  # It is managed via the PocketHost dashboard — no CI step needed.
  # https://pockethost.io
  # ────────────────────────────────────────────────────────────────────────────

  # ────────────────────────────────────────────────────────────────────────────
  # 1. Deploy Backend → Render.com (via Deploy Hook URL)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render.com
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render deploy hook response: $RESPONSE"
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
            echo "Render deploy hook failed with status $RESPONSE"
            exit 1
          fi

      - name: Wait for Render backend to be healthy
        run: |
          echo "Waiting for backend health check..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.RENDER_BACKEND_URL }}/api/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy!"
              exit 0
            fi
            sleep 15
          done
          echo "Backend did not become healthy in time"
          exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Build Frontend → Deploy to Vercel
  # ────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-backend   # Wait for backend to be live before publishing frontend

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.RENDER_BACKEND_URL }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: "./"   # Vercel reads vercel.json from repo root
