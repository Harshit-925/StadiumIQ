<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0B2545"/>
  
  <!-- Football white base -->
  <circle cx="16" cy="16" r="12" fill="white"/>
  
  <!-- Central pentagon (black) -->
  <polygon points="16,8 19.8,10.8 18.5,15.3 13.5,15.3 12.2,10.8" fill="#1a1a1a"/>
  
  <!-- Top-left pentagon -->
  <polygon points="9,11.5 12.2,10.8 13.5,15.3 10,16.5 8,14" fill="#1a1a1a"/>
  
  <!-- Top-right pentagon -->
  <polygon points="23,11.5 19.8,10.8 18.5,15.3 22,16.5 24,14" fill="#1a1a1a"/>
  
  <!-- Bottom-left pentagon -->
  <polygon points="10,16.5 13.5,15.3 14.5,19.5 11,21 9,18.5" fill="#1a1a1a"/>
  
  <!-- Bottom-right pentagon -->
  <polygon points="22,16.5 18.5,15.3 17.5,19.5 21,21 23,18.5" fill="#1a1a1a"/>
  
  <!-- Bottom pentagon -->
  <polygon points="16,24 14.5,19.5 17.5,19.5" fill="#1a1a1a"/>
  
  <!-- Gold accent ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#D4A94A" stroke-width="1.5"/>
</svg>
